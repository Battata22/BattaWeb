<script>
  let ultimaRequest = 0;

  function fadeIn(element) {
    element.style.opacity = 0;
    element.style.transition = "opacity 0.4s ease";
    requestAnimationFrame(() => {
      element.style.opacity = 1;
    });
  }

  function fadeOut(element, callback) {
    element.style.opacity = 1;
    element.style.transition = "opacity 0.3s ease";
    element.style.opacity = 0;
    setTimeout(callback, 300);
  }

  async function mostrarLista() {
    const boton = document.getElementById("miBoton");

    fadeOut(boton, () => {
      boton.style.display = "none";
    });

    const requestId = ++ultimaRequest;
    const url = "data.json?t=" + Date.now();

    try {
      const res = await fetch(url, { cache: "no-store" });

      if (!res.ok) throw new Error("HTTP " + res.status);

      const data = await res.json();

      if (requestId !== ultimaRequest) return;

      const contenedor = document.getElementById("contenido");
      contenedor.innerHTML = "";

      const ul = document.createElement("ul");
      ul.style.listStyle = "none";
      ul.style.padding = "0";
      ul.style.margin = "0";
      ul.style.textAlign = "center";
      ul.style.fontSize = "20px";
      ul.style.opacity = 0;

      data.forEach(item => {
        const li = document.createElement("li");
        li.textContent = (item.texto || "").trim();
        li.style.color = (item.color || "white").trim();
        li.style.margin = "5px 0";
        ul.appendChild(li);
      });

      const volverBtn = document.createElement("button");
      volverBtn.textContent = "Volver";
      volverBtn.onclick = volverInicio;
      volverBtn.style.marginTop = "20px";
      volverBtn.style.padding = "10px 20px";
      volverBtn.style.fontSize = "16px";
      volverBtn.style.border = "none";
      volverBtn.style.borderRadius = "8px";
      volverBtn.style.cursor = "pointer";
      volverBtn.style.opacity = 0;

      contenedor.appendChild(ul);
      contenedor.appendChild(volverBtn);

      fadeIn(ul);
      fadeIn(volverBtn);

    } catch (err) {
      document.getElementById("contenido").innerHTML =
        "<p style='color:white;'>Error: " + err.message + "</p>";
    }
  }

  function volverInicio() {
    const contenedor = document.getElementById("contenido");
    const boton = document.getElementById("miBoton");

    fadeOut(contenedor, () => {
      contenedor.innerHTML = "";
      contenedor.style.opacity = 1;

      boton.style.display = "block";
      fadeIn(boton);
    });
  }
</script>
