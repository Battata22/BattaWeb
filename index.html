<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Batta Web</title>
</head>
<body style="margin:0; background:#362364; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; flex-direction:column;">

  <button id="miBoton" onclick="mostrarLista()" 
    style="padding:15px 30px; font-size:18px; border:none; border-radius:8px; cursor:pointer;">
    Lolo Puto
  </button>

  <div id="contenido" style="display:flex; flex-direction:column; align-items:center;"></div>

  <script>
    function mostrarLista() {
      document.getElementById("miBoton").style.display = "none";

      document.getElementById("contenido").innerHTML = `
        <ul style="list-style:none; padding:0; margin:0; text-align:center; font-size:20px;">
          <li style="color:#FF0000;">lolo</li>
          <li style="color:#FF8000;">es</li>
          <li style="color:#ffff00;">super</li>
          <li style="color:#00ff00;">ultra</li>
          <li style="color:#00FF80;">omega</li>
          <li style="color:#0000ff;">hyper</li>
          <li style="color:#8000FF;">trolo</li>
        </ul>

        <button onclick="volverInicio()" 
          style="margin-top:20px; padding:10px 20px; font-size:16px; border:none; border-radius:8px; cursor:pointer;">
          Volver
        </button>
      `;
    }

    function volverInicio() {
      document.getElementById("contenido").innerHTML = "";
      document.getElementById("miBoton").style.display = "block";
    }
  </script>

</body>
</html>
