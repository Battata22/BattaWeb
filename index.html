<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Batta Web</title>
</head>

<body style="margin:0; background:#362364; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; flex-direction:column;">

  <button id="miBoton" onclick="mostrarLista()" 
    style="padding:15px 30px; font-size:18px; border:none; border-radius:8px; cursor:pointer;">
    Lolo Puto
  </button>

  <div id="contenido" style="display:flex; flex-direction:column; align-items:center;"></div>

  <script>
    async function mostrarLista() {
      document.getElementById("miBoton").style.display = "none";

      const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4iJQFriUKvVk8X3rPNB73zSQTXmfokqxrajS84qcrsmJ6J3YkIIbjw-pgzJg3aFfwsTFtK2y7wlSr/pub?gid=0&single=true&output=csv";

      try {
        const res = await fetch(url);
        cache: "no-store"

        if (!res.ok) {
          throw new Error("No se pudo cargar el CSV (HTTP " + res.status + ")");
        }

        const texto = await res.text();

        console.log("CSV RAW:", texto);

        const filas = texto
          .split("\n")
          .map(f => f.trim())
          .filter(f => f !== "");

        let listaHTML = `
          <ul style="list-style:none; padding:0; margin:0; text-align:center; font-size:20px;">
        `;

        filas.forEach(fila => {

          // 🔥 soporta coma o punto y coma
          const columnas = fila.includes(";") ? fila.split(";") : fila.split(",");

          const color = (columnas[0] || "").trim();
          const texto = (columnas[1] || "").trim();

          if (texto) {
            listaHTML += `<li style="color:${color || "white"}; margin:5px 0;">${texto}</li>`;
          }
        });

        listaHTML += `</ul>`;

        listaHTML += `
          <button onclick="volverInicio()" 
            style="margin-top:20px; padding:10px 20px; font-size:16px; border:none; border-radius:8px; cursor:pointer;">
            Volver
          </button>
        `;

        document.getElementById("contenido").innerHTML = listaHTML;

      } catch (err) {
        console.error(err);
        document.getElementById("contenido").innerHTML =
          "<p style='color:white;'>Error cargando datos: " + err.message + "</p>";
      }
    }

    function volverInicio() {
      document.getElementById("contenido").innerHTML = "";
      document.getElementById("miBoton").style.display = "block";
    }
  </script>

</body>
</html>
