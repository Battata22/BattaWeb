<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Batta's Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080810; --surface:#0f0f1a; --card:#13131f; --border:#1e1e30;
      --border-light:#2a2a40; --accent:#5b8dee; --accent2:#ee5b8d;
      --accent3:#5beeb0; --text:#e8e8f2; --muted:#5a5a78;
      --sans:'Outfit',sans-serif; --mono:'JetBrains Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;}
    body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size:150px;opacity:.4;}
    .blob{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;}
    .blob-1{width:500px;height:500px;background:#5b8dee22;top:-150px;left:-100px;}
    .blob-2{width:400px;height:400px;background:#ee5b8d18;bottom:-100px;right:-100px;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
      justify-content:space-between;padding:0 48px;height:64px;
      background:#08081088;backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{display:flex;align-items:center;gap:10px;font-size:.9rem;font-weight:700;
      letter-spacing:.06em;color:var(--text);text-decoration:none;}
    .nav-logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 10px var(--accent);animation:blink 3s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .nav-buttons{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .nav-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:8px;
      font-family:var(--sans);font-size:.82rem;font-weight:600;border:1px solid var(--border);
      background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;
      transition:all .2s;letter-spacing:.02em;position:relative;overflow:hidden;}
    .nav-btn::before{content:'';position:absolute;inset:0;background:var(--btn-glow,var(--accent));
      opacity:0;transition:opacity .2s;}
    .nav-btn:hover{border-color:var(--btn-color,var(--accent));}
    .nav-btn:hover::before{opacity:.08;}
    .nav-btn>*{position:relative;z-index:1;}
    .nav-btn-admin{font-family:var(--mono);font-size:.72rem;--btn-color:#f0c070;--btn-glow:#f0c070;}
    .nav-btn-admin:hover{color:#f0c070;}
    .nav-btn-me{--btn-color:var(--accent2);--btn-glow:var(--accent2);}
    .nav-btn-me:hover{color:var(--accent2);}
    .nav-btn-custom:hover{color:var(--btn-color);}

    /* MAIN */
    main{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:80px 24px 60px;text-align:center;}
    .hero-eyebrow{font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;color:var(--accent);
      text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fadeUp .6s .2s forwards;}
    .hero-title{font-size:clamp(2.8rem,7vw,5rem);font-weight:900;line-height:1.0;
      letter-spacing:-.03em;margin-bottom:24px;opacity:0;animation:fadeUp .6s .35s forwards;}
    .hero-title .line2{background:linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-sub{font-size:1rem;color:var(--muted);max-width:400px;line-height:1.7;
      margin-bottom:60px;opacity:0;animation:fadeUp .6s .5s forwards;}
    .hero-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
      opacity:0;animation:fadeUp .6s .65s forwards;}
    .hero-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:28px 24px;width:180px;cursor:pointer;text-decoration:none;
      display:flex;flex-direction:column;align-items:center;gap:12px;
      transition:transform .25s,border-color .25s,box-shadow .25s;
      position:relative;overflow:hidden;}
    .hero-card::before{content:'';position:absolute;inset:0;
      background:var(--card-glow,linear-gradient(135deg,#5b8dee15,transparent));
      opacity:0;transition:opacity .3s;}
    .hero-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px #0008;}
    .hero-card:hover::before{opacity:1;}
    .hero-card:hover .card-icon{transform:scale(1.15);}
    .card-icon{font-size:1.8rem;transition:transform .3s;position:relative;z-index:1;}
    .card-label{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);font-family:var(--mono);position:relative;z-index:1;transition:color .2s;}
    .hero-card-me{--card-glow:linear-gradient(135deg,#ee5b8d15,transparent);}
    .hero-card-me:hover{border-color:var(--accent2);}
    .hero-card-me:hover .card-label{color:var(--accent2);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* OVERLAYS */
    .panel-overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(8px);z-index:200;
      opacity:0;pointer-events:none;transition:opacity .3s;
      display:flex;align-items:center;justify-content:center;padding:24px;}
    .panel-overlay.open{opacity:1;pointer-events:all;}
    .panel,.admin-panel{background:var(--card);border:1px solid var(--border);border-radius:24px;
      width:100%;max-height:90vh;overflow-y:auto;
      transform:translateY(24px) scale(.97);transition:transform .3s;
      scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .panel{max-width:600px;}
    .admin-panel{max-width:700px;}
    .panel-overlay.open .panel,.panel-overlay.open .admin-panel{transform:translateY(0) scale(1);}
    .panel-header{display:flex;align-items:center;justify-content:space-between;
      padding:24px 28px 18px;border-bottom:1px solid var(--border);
      position:sticky;top:0;background:var(--card);z-index:1;}
    .panel-title{font-size:1.05rem;font-weight:700;}
    .panel-close{background:var(--border);border:none;cursor:pointer;width:30px;height:30px;
      border-radius:8px;color:var(--muted);display:flex;align-items:center;justify-content:center;
      font-size:1rem;transition:background .2s;}
    .panel-close:hover{background:var(--border-light);color:var(--text);}
    .panel-body{padding:24px 28px;}

    /* ME PANEL WIDGETS */
    .me-section{margin-bottom:24px;}
    .me-section-label{font-family:var(--mono);font-size:.65rem;letter-spacing:.15em;
      color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
    .tags-grid{display:flex;flex-wrap:wrap;gap:7px;}
    .tag{padding:5px 13px;border-radius:99px;font-size:.78rem;font-weight:500;
      border:1px solid;letter-spacing:.02em;text-decoration:none;transition:filter .2s;}
    .tag:hover{filter:brightness(1.2);}

    /* SOCIAL LINK CARDS */
    .social-links{display:flex;flex-wrap:wrap;gap:10px;}
    .social-card{display:flex;align-items:center;gap:10px;padding:10px 16px;
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      text-decoration:none;color:var(--text);transition:all .2s;min-width:140px;}
    .social-card:hover{border-color:var(--accent);transform:translateY(-2px);}
    .social-favicon{width:18px;height:18px;border-radius:4px;object-fit:contain;
      background:var(--border);padding:1px;}
    .social-name{font-size:.82rem;font-weight:600;}

    /* STEAM CARD */
    .steam-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:16px;display:flex;gap:14px;align-items:center;}
    .steam-avatar{width:56px;height:56px;border-radius:10px;object-fit:cover;
      border:2px solid var(--border);}
    .steam-avatar.online{border-color:#5beeb0;}
    .steam-avatar.away{border-color:#f0c070;}
    .steam-info{flex:1;min-width:0;}
    .steam-name{font-weight:700;font-size:.95rem;margin-bottom:3px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .steam-status{font-size:.75rem;font-family:var(--mono);}
    .steam-status.online{color:#5beeb0;}
    .steam-status.away{color:#f0c070;}
    .steam-status.offline{color:var(--muted);}
    .steam-game{font-size:.72rem;color:var(--muted);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .steam-loading{color:var(--muted);font-size:.8rem;font-family:var(--mono);}

    /* LASTFM / SPOTIFY CARD */
    .music-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:14px;display:flex;gap:12px;align-items:center;}
    .music-art{width:52px;height:52px;border-radius:8px;object-fit:cover;
      background:var(--border);flex-shrink:0;}
    .music-info{flex:1;min-width:0;}
    .music-track{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .music-artist{font-size:.75rem;color:var(--muted);margin-top:2px;}
    .music-live{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;
      font-family:var(--mono);color:#1db954;margin-top:4px;}
    .music-live-dot{width:6px;height:6px;border-radius:50%;background:#1db954;
      animation:blink 1s ease-in-out infinite;}
    .music-source{font-size:.68rem;color:var(--muted);font-family:var(--mono);}
    .spotify-embed{border-radius:14px;overflow:hidden;border:1px solid var(--border);}

    /* ADMIN */
    .admin-section-title{font-family:var(--mono);font-size:.68rem;letter-spacing:.15em;
      color:#f0c070;text-transform:uppercase;margin-bottom:10px;}
    .admin-row{display:flex;gap:7px;margin-bottom:7px;align-items:center;}
    .admin-input{flex:1;background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:8px 11px;color:var(--text);font-family:var(--sans);
      font-size:.83rem;transition:border-color .2s;width:100%;}
    .admin-input:focus{outline:none;border-color:#f0c07060;}
    .admin-input::placeholder{color:var(--muted);}
    .color-input{width:38px;height:36px;border-radius:8px;border:1px solid var(--border);
      background:var(--surface);cursor:pointer;padding:2px;flex-shrink:0;}
    .admin-btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;
      font-family:var(--sans);font-size:.78rem;font-weight:600;transition:filter .2s;}
    .admin-btn:hover{filter:brightness(1.2);}
    .admin-btn-add{background:#5b8dee20;color:var(--accent);border:1px solid #5b8dee40;}
    .admin-btn-remove{background:#ee5b5b20;color:#ee5b5b;border:1px solid #ee5b5b40;
      width:34px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .admin-btn-save{background:linear-gradient(135deg,#f0c070,#e0a040);color:#1a1000;font-weight:700;padding:9px 22px;}
    .admin-btn-login{background:linear-gradient(135deg,#f0c070,#e0a040);color:#1a1000;
      font-weight:700;padding:11px 24px;width:100%;margin-top:8px;border-radius:10px;font-size:.9rem;}
    .admin-field-label{font-size:.7rem;color:var(--muted);font-family:var(--mono);
      letter-spacing:.12em;margin-bottom:5px;display:block;text-transform:uppercase;}
    .admin-field{margin-bottom:14px;}
    .admin-login-error{color:#ee5b5b;font-size:.78rem;margin-top:6px;display:none;}
    .admin-divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
    .admin-note{font-size:.75rem;color:var(--muted);margin-top:4px;line-height:1.5;}

    footer{position:relative;z-index:1;text-align:center;padding:20px;
      border-top:1px solid var(--border);font-family:var(--mono);font-size:.65rem;color:var(--muted);}

    @media(max-width:600px){
      nav{padding:0 16px;}
      .nav-btn .lbl{display:none;}
      .panel-body,.panel-header{padding-left:16px;padding-right:16px;}
    }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
  <a class="nav-logo" href="#">
    <div class="nav-logo-dot"></div>
    <span id="navSiteName">Batta's Web</span>
  </a>
  <div class="nav-buttons" id="navButtons"></div>
</nav>

<main>
  <p class="hero-eyebrow">Private Infrastructure</p>
  <h1 class="hero-title">Your server.<br><span class="line2">Your rules.</span></h1>
  <p class="hero-sub">Access your files, machines, and personal space from anywhere in the world.</p>
  <div class="hero-cards" id="heroCards"></div>
</main>

<footer id="footerText">Batta's Web &nbsp;·&nbsp; TrueNAS Scale</footer>

<!-- ME PANEL -->
<div class="panel-overlay" id="meOverlay" onclick="if(event.target===this)closeMe()">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="meTitle">About</span>
      <button class="panel-close" onclick="closeMe()">✕</button>
    </div>
    <div class="panel-body" id="meBody"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="panel-overlay" id="adminOverlay" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-panel" id="adminPanelInner"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG
//  Edit defaults here OR use the Admin Panel in the browser
// ══════════════════════════════════════════════════════════
const CONFIG_KEY = 'battaweb_config_v2';

const DEFAULT_CONFIG = {
  adminPassword: '314159265!#!',
  siteName: "Batta's Web",

  // ── Nav / card buttons (add/remove freely) ──
  // type: 'link' | 'me'
  // color: hex accent color for hover glow
  buttons: [
    { id:'storage', label:'Storage', icon:'☁️', url:'https://cloud.Battaweb.com',        color:'#5b8dee', type:'link' },
    { id:'vm',      label:'VM',      icon:'🖥️', url:'http://truenas.local/ui/vm',         color:'#5beeb0', type:'link' },
    // ↑ Replace VM url with your noVNC display URL once confirmed
    { id:'me',      label:'Me',      icon:'👤', url:'',                                  color:'#ee5b8d', type:'me'   },
  ],

  // ── Me panel ──
  meTitle: 'Batta',
  meSections: [
    {
      type: 'tags',
      label: 'Skills',
      tags: [
        { text:'TrueNAS',     color:'#5b8dee', bg:'#5b8dee18' },
        { text:'Nextcloud',   color:'#5beeb0', bg:'#5beeb018' },
        { text:'Networking',  color:'#ee5b8d', bg:'#ee5b8d18' },
        { text:'Self-hosted', color:'#f0c070', bg:'#f0c07018' },
      ]
    },
    {
      type: 'social',
      label: 'Links',
      links: [
        { name:'GitHub',   url:'https://github.com/',          color:'#aaaaff' },
        { name:'LinkedIn', url:'https://linkedin.com/in/',     color:'#0a66c2' },
        { name:'Steam',    url:'https://steamcommunity.com/id/Battata22/', color:'#1b9af7' },
        { name:'Instagram',url:'https://instagram.com/',       color:'#ee5b8d' },
      ]
    },
    {
      type: 'steam',
      label: 'Steam',
      // Uses Steam's public XML API via a CORS proxy
      // steamId64: find yours at steamid.io — needed for API
      // vanityUrl: your custom URL part (Battata22)
      vanityUrl: 'Battata22',
      steamId64: '', // ← FILL IN your Steam64 ID (get it from steamid.io)
    },
    {
      type: 'lastfm',
      label: 'Now Playing',
      // Last.fm: fill in your username when you create an account
      // API key is public/free — already included below
      lastfmUser: '',        // ← e.g. 'Battata22'
      lastfmApiKey: 'PUT_YOUR_LASTFM_API_KEY_HERE', // free at last.fm/api
      // OR use a Spotify embed (paste embed URL from Spotify → Share → Embed)
      spotifyEmbedUrl: '',   // ← e.g. 'https://open.spotify.com/embed/playlist/...'
    },
  ],
};

// ── State ──
let cfg = (() => {
  try {
    const s = localStorage.getItem(CONFIG_KEY);
    if (!s) return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    const saved = JSON.parse(s);
    // deep merge buttons
    return Object.assign(JSON.parse(JSON.stringify(DEFAULT_CONFIG)), saved);
  } catch { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
})();
let adminLoggedIn = false;
function saveConfig(){ localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); }

// ── Favicon helper ──
function favicon(url){
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; }
  catch { return ''; }
}

// ── Render Nav + Cards ──
function renderNav(){
  document.title = cfg.siteName;
  document.getElementById('navSiteName').textContent = cfg.siteName;
  document.getElementById('footerText').textContent = cfg.siteName + ' · TrueNAS Scale';

  const nb = document.getElementById('navButtons');
  nb.innerHTML = cfg.buttons.map(btn => {
    if(btn.type === 'me') return `
      <button class="nav-btn nav-btn-me" onclick="openMe()"
        style="--btn-color:${btn.color};--btn-glow:${btn.color}">
        <span>${btn.icon}</span><span class="lbl">${btn.label}</span>
      </button>`;
    return `
      <a class="nav-btn nav-btn-custom" href="${btn.url}" target="_blank" rel="noopener"
        style="--btn-color:${btn.color};--btn-glow:${btn.color}">
        <span>${btn.icon}</span><span class="lbl">${btn.label}</span>
      </a>`;
  }).join('') + `
    <button class="nav-btn nav-btn-admin" onclick="openAdmin()" title="Admin">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <span>Batta</span>
    </button>`;

  // Cards
  const hc = document.getElementById('heroCards');
  hc.innerHTML = cfg.buttons.map((btn,i) => {
    const style = `--card-glow:linear-gradient(135deg,${btn.color}18,transparent)`;
    const hoverStyle = `onmouseenter="this.style.borderColor='${btn.color}';this.querySelector('.card-label').style.color='${btn.color}'" onmouseleave="this.style.borderColor='';this.querySelector('.card-label').style.color=''"`;
    if(btn.type === 'me') return `
      <div class="hero-card hero-card-me" style="${style}" onclick="openMe()" ${hoverStyle}>
        <div class="card-icon">${btn.icon}</div>
        <div class="card-label">${btn.label}</div>
      </div>`;
    return `
      <a class="hero-card" href="${btn.url}" target="_blank" rel="noopener"
        style="${style};animation-delay:${0.65+i*0.08}s" ${hoverStyle}>
        <div class="card-icon">${btn.icon}</div>
        <div class="card-label">${btn.label}</div>
      </a>`;
  }).join('');
}

// ── Me Panel ──
async function openMe(){
  document.getElementById('meTitle').textContent = cfg.meTitle;
  const body = document.getElementById('meBody');
  body.innerHTML = '<div style="color:var(--muted);font-family:var(--mono);font-size:.8rem">Loading...</div>';
  document.getElementById('meOverlay').classList.add('open');

  let html = '';
  for(const sec of cfg.meSections){
    html += `<div class="me-section"><div class="me-section-label">${sec.label}</div>`;

    if(sec.type === 'tags'){
      html += `<div class="tags-grid">${sec.tags.map(t=>`
        <span class="tag" style="color:${t.color};background:${t.bg};border-color:${t.color}40">${t.text}</span>
      `).join('')}</div>`;

    } else if(sec.type === 'social'){
      html += `<div class="social-links">${sec.links.map(l=>`
        <a class="social-card" href="${l.url}" target="_blank" rel="noopener"
          onmouseenter="this.style.borderColor='${l.color}'" onmouseleave="this.style.borderColor=''">
          <img class="social-favicon" src="${favicon(l.url)}" onerror="this.style.display='none'"/>
          <span class="social-name">${l.name}</span>
        </a>
      `).join('')}</div>`;

    } else if(sec.type === 'steam'){
      html += `<div id="steamWidget"><div class="steam-loading">⏳ Loading Steam profile...</div></div>`;

    } else if(sec.type === 'lastfm'){
      if(sec.spotifyEmbedUrl){
        html += `<div class="spotify-embed">
          <iframe src="${sec.spotifyEmbedUrl}" width="100%" height="152" frameborder="0"
            allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture"
            loading="lazy" style="border-radius:14px"></iframe>
        </div>`;
      } else if(sec.lastfmUser && sec.lastfmApiKey !== 'PUT_YOUR_LASTFM_API_KEY_HERE'){
        html += `<div id="lastfmWidget"><div class="steam-loading">⏳ Loading Last.fm...</div></div>`;
      } else {
        html += `<div style="background:var(--surface);border:1px dashed var(--border);border-radius:12px;padding:16px;font-size:.8rem;color:var(--muted)">
          🎵 Music widget — configure Last.fm username or Spotify embed URL in Admin Panel
        </div>`;
      }
    }
    html += '</div>';
  }
  body.innerHTML = html;

  // Load Steam
  const steamSec = cfg.meSections.find(s=>s.type==='steam');
  if(steamSec) loadSteam(steamSec);

  // Load Last.fm
  const lfmSec = cfg.meSections.find(s=>s.type==='lastfm');
  if(lfmSec && lfmSec.lastfmUser && lfmSec.lastfmApiKey !== 'PUT_YOUR_LASTFM_API_KEY_HERE') loadLastfm(lfmSec);
}

function closeMe(){ document.getElementById('meOverlay').classList.remove('open'); }

// ── Steam loader ──
async function loadSteam(sec){
  const el = document.getElementById('steamWidget');
  if(!el) return;
  if(!sec.steamId64){
    el.innerHTML = `<a class="steam-card" href="https://steamcommunity.com/id/${sec.vanityUrl}/" target="_blank" rel="noopener">
      <img class="steam-avatar" src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg"/>
      <div class="steam-info">
        <div class="steam-name">${sec.vanityUrl}</div>
        <div class="steam-status offline">Fill steamId64 in config for live status</div>
      </div>
    </a>`;
    return;
  }
  try {
    // Use allorigins CORS proxy to fetch Steam profile XML
    const url = `https://steamcommunity.com/profiles/${sec.steamId64}/?xml=1`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, 'text/xml');
    const get = tag => xml.querySelector(tag)?.textContent || '';
    const name = get('steamID');
    const avatar = get('avatarFull');
    const stateCode = parseInt(get('onlineState')) || 0;
    const game = get('inGameInfo gameName') || get('inGameServerIP') ? 'In a game' : '';
    const stateMap = {0:'Offline',1:'Online',2:'Busy',3:'Away',4:'Snooze',5:'Looking to trade',6:'Looking to play'};
    const stateClass = stateCode === 0 ? 'offline' : stateCode === 3 ? 'away' : 'online';
    const stateText = game ? `🎮 ${get('inGameInfo gameName') || 'In a game'}` : (stateMap[stateCode] || 'Offline');
    el.innerHTML = `<a class="steam-card" href="https://steamcommunity.com/id/${sec.vanityUrl}/" target="_blank" rel="noopener">
      <img class="steam-avatar ${stateClass}" src="${avatar}" onerror="this.src='https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg'"/>
      <div class="steam-info">
        <div class="steam-name">${name}</div>
        <div class="steam-status ${stateClass}">${stateText}</div>
        ${game ? `<div class="steam-game">Playing: ${get('inGameInfo gameName')}</div>` : ''}
      </div>
    </a>`;
  } catch(e){
    el.innerHTML = `<a class="steam-card" href="https://steamcommunity.com/id/${sec.vanityUrl}/" target="_blank" rel="noopener">
      <div class="steam-info"><div class="steam-name">${sec.vanityUrl}</div>
      <div class="steam-status offline">Could not load profile</div></div>
    </a>`;
  }
}

// ── Last.fm loader ──
async function loadLastfm(sec){
  const el = document.getElementById('lastfmWidget');
  if(!el) return;
  try{
    const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${sec.lastfmUser}&api_key=${sec.lastfmApiKey}&format=json&limit=1`;
    const res = await fetch(url);
    const data = await res.json();
    const track = data.recenttracks?.track?.[0];
    if(!track){ el.innerHTML='<div class="steam-loading">No recent tracks</div>'; return; }
    const isNow = track['@attr']?.nowplaying === 'true';
    const art = track.image?.find(i=>i.size==='medium')?.['#text'] || '';
    el.innerHTML = `<div class="music-card">
      ${art ? `<img class="music-art" src="${art}" onerror="this.style.display='none'"/>` : ''}
      <div class="music-info">
        <div class="music-track">${track.name}</div>
        <div class="music-artist">${track.artist?.['#text'] || ''}</div>
        ${isNow ? `<div class="music-live"><span class="music-live-dot"></span>Now playing</div>` : `<div class="music-source">Last played · Last.fm</div>`}
      </div>
    </div>`;
  } catch(e){ el.innerHTML='<div class="steam-loading">Could not load Last.fm</div>'; }
}

// ── Admin Panel ──
function openAdmin(){ adminLoggedIn ? renderAdminEditor() : renderAdminLogin(); document.getElementById('adminOverlay').classList.add('open'); }
function closeAdmin(){ document.getElementById('adminOverlay').classList.remove('open'); }

function renderAdminLogin(){
  document.getElementById('adminPanelInner').innerHTML = `
    <div class="panel-header">
      <span class="panel-title" style="color:#f0c070">⚙ Admin</span>
      <button class="panel-close" onclick="closeAdmin()">✕</button>
    </div>
    <div style="padding:28px">
      <div class="admin-field">
        <label class="admin-field-label">Password</label>
        <input class="admin-input" type="password" id="adminPassInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()"/>
        <div class="admin-login-error" id="loginErr">Incorrect password.</div>
      </div>
      <button class="admin-btn admin-btn-login" onclick="tryLogin()">Sign in →</button>
    </div>`;
  setTimeout(()=>document.getElementById('adminPassInput')?.focus(), 80);
}

function tryLogin(){
  if(document.getElementById('adminPassInput').value === cfg.adminPassword){ adminLoggedIn=true; renderAdminEditor(); }
  else document.getElementById('loginErr').style.display='block';
}

function renderAdminEditor(){
  document.getElementById('adminPanelInner').innerHTML = `
    <div class="panel-header">
      <span class="panel-title" style="color:#f0c070">⚙ Admin Panel</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="admin-btn admin-btn-save" onclick="applyAndSave()">💾 Save</button>
        <button class="panel-close" onclick="closeAdmin()">✕</button>
      </div>
    </div>
    <div style="padding:20px 28px 32px;display:flex;flex-direction:column;gap:20px">

      <div>
        <div class="admin-section-title">Site</div>
        <div class="admin-field">
          <label class="admin-field-label">Site Name</label>
          <input class="admin-input" id="cfgSiteName" value="${cfg.siteName}"/>
        </div>
      </div>

      <div>
        <div class="admin-section-title">Nav & Card Buttons</div>
        <p class="admin-note" style="margin-bottom:12px">Add buttons that appear in the nav bar and as cards on the main page. Type "me" opens your profile panel instead of a link.</p>
        <div id="btnEditor"></div>
        <button class="admin-btn admin-btn-add" onclick="addButton()" style="margin-top:6px">+ Add button</button>
      </div>

      <div>
        <div class="admin-section-title">Me Panel — Display Name</div>
        <input class="admin-input" id="cfgMeTitle" value="${cfg.meTitle}"/>
      </div>

      <div>
        <div class="admin-section-title">Me Panel — Sections</div>
        <p class="admin-note" style="margin-bottom:10px">Each section appears in the Me panel. Types: <b>tags</b> (colored pills), <b>social</b> (link cards with favicons), <b>steam</b> (live Steam profile), <b>lastfm</b> (now playing / Spotify embed).</p>
        <div id="sectionsEditor"></div>
        <button class="admin-btn admin-btn-add" onclick="addSection()" style="margin-top:6px">+ Add section</button>
      </div>

      <div>
        <div class="admin-section-title">Steam Config</div>
        <div class="admin-field">
          <label class="admin-field-label">Steam Vanity URL (the part after /id/)</label>
          <input class="admin-input" id="cfgSteamVanity" value="${(cfg.meSections.find(s=>s.type==='steam')||{}).vanityUrl||''}"/>
        </div>
        <div class="admin-field">
          <label class="admin-field-label">Steam 64-bit ID (get it from steamid.io)</label>
          <input class="admin-input" id="cfgSteamId" value="${(cfg.meSections.find(s=>s.type==='steam')||{}).steamId64||''}" placeholder="76561198xxxxxxxxx"/>
        </div>
      </div>

      <div>
        <div class="admin-section-title">Music Widget</div>
        <div class="admin-field">
          <label class="admin-field-label">Last.fm Username (leave blank if not using)</label>
          <input class="admin-input" id="cfgLfmUser" value="${(cfg.meSections.find(s=>s.type==='lastfm')||{}).lastfmUser||''}" placeholder="your_lastfm_username"/>
        </div>
        <div class="admin-field">
          <label class="admin-field-label">Last.fm API Key (free at last.fm/api)</label>
          <input class="admin-input" id="cfgLfmKey" value="${(cfg.meSections.find(s=>s.type==='lastfm')||{}).lastfmApiKey||''}" placeholder="PUT_YOUR_LASTFM_API_KEY_HERE"/>
        </div>
        <div class="admin-field">
          <label class="admin-field-label">OR Spotify Embed URL (overrides Last.fm)</label>
          <input class="admin-input" id="cfgSpotify" value="${(cfg.meSections.find(s=>s.type==='lastfm')||{}).spotifyEmbedUrl||''}" placeholder="https://open.spotify.com/embed/playlist/..."/>
          <div class="admin-note">In Spotify → right click playlist → Share → Embed playlist → copy URL</div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border);padding-top:16px">
        <div class="admin-section-title">Security</div>
        <div class="admin-field">
          <label class="admin-field-label">New Admin Password (blank = keep current)</label>
          <input class="admin-input" id="cfgNewPass" type="password" placeholder="New password"/>
        </div>
      </div>

    </div>`;
  renderBtnEditor();
  renderSectionsEditor();
}

function renderBtnEditor(){
  const el = document.getElementById('btnEditor'); if(!el) return;
  el.innerHTML = cfg.buttons.map((btn,i)=>`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div class="admin-row">
        <input class="admin-input" style="max-width:60px" value="${btn.icon}" placeholder="emoji"
          onchange="cfg.buttons[${i}].icon=this.value"/>
        <input class="admin-input" value="${btn.label}" placeholder="Label"
          onchange="cfg.buttons[${i}].label=this.value"/>
        <input type="color" class="color-input" value="${btn.color}"
          onchange="cfg.buttons[${i}].color=this.value" title="Accent color"/>
        <button class="admin-btn admin-btn-remove" onclick="removeButton(${i})" title="Remove">✕</button>
      </div>
      <div class="admin-row">
        <select class="admin-input" style="max-width:90px" onchange="cfg.buttons[${i}].type=this.value">
          <option value="link" ${btn.type==='link'?'selected':''}>Link</option>
          <option value="me"   ${btn.type==='me'?'selected':''}>Me panel</option>
        </select>
        <input class="admin-input" value="${btn.url||''}" placeholder="https://..."
          onchange="cfg.buttons[${i}].url=this.value" ${btn.type==='me'?'disabled':''}/>
      </div>
    </div>`).join('');
}

function addButton(){
  cfg.buttons.push({id:'btn'+Date.now(),label:'New',icon:'🔗',url:'',color:'#5b8dee',type:'link'});
  renderBtnEditor();
}
function removeButton(i){ cfg.buttons.splice(i,1); renderBtnEditor(); }

function renderSectionsEditor(){
  const el = document.getElementById('sectionsEditor'); if(!el) return;
  el.innerHTML = cfg.meSections.map((sec,si)=>{
    let inner = '';
    if(sec.type==='tags'){
      inner = `<div id="tagsEd_${si}"></div>
        <button class="admin-btn admin-btn-add" onclick="addTag(${si})" style="margin-top:6px;font-size:.72rem;padding:5px 10px">+ Tag</button>`;
    } else if(sec.type==='social'){
      inner = `<div id="linksEd_${si}"></div>
        <button class="admin-btn admin-btn-add" onclick="addLink(${si})" style="margin-top:6px;font-size:.72rem;padding:5px 10px">+ Link</button>`;
    } else if(sec.type==='steam'){
      inner = `<div class="admin-note">Steam config is in the Steam Config section above.</div>`;
    } else if(sec.type==='lastfm'){
      inner = `<div class="admin-note">Music config is in the Music Widget section above.</div>`;
    }
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">
      <div class="admin-row" style="margin-bottom:8px">
        <select class="admin-input" style="max-width:100px" onchange="cfg.meSections[${si}].type=this.value;renderSectionsEditor()">
          <option value="tags"   ${sec.type==='tags'?'selected':''}>Tags</option>
          <option value="social" ${sec.type==='social'?'selected':''}>Social</option>
          <option value="steam"  ${sec.type==='steam'?'selected':''}>Steam</option>
          <option value="lastfm" ${sec.type==='lastfm'?'selected':''}>Music</option>
        </select>
        <input class="admin-input" value="${sec.label}" placeholder="Label"
          onchange="cfg.meSections[${si}].label=this.value"/>
        <button class="admin-btn admin-btn-remove" onclick="removeSection(${si})">✕</button>
      </div>
      ${inner}
    </div>`;
  }).join('');
  cfg.meSections.forEach((_,si)=>{ renderTagsEditor(si); renderLinksEditor(si); });
}

function renderTagsEditor(si){
  const el = document.getElementById(`tagsEd_${si}`); if(!el) return;
  const sec = cfg.meSections[si]; if(sec.type!=='tags') return;
  el.innerHTML = (sec.tags||[]).map((tag,ti)=>`
    <div class="admin-row">
      <input class="admin-input" value="${tag.text}" onchange="cfg.meSections[${si}].tags[${ti}].text=this.value"/>
      <input type="color" class="color-input" value="${tag.color}"
        onchange="cfg.meSections[${si}].tags[${ti}].color=this.value;cfg.meSections[${si}].tags[${ti}].bg=this.value+'18'"/>
      <button class="admin-btn admin-btn-remove" onclick="removeTag(${si},${ti})">✕</button>
    </div>`).join('');
}

function renderLinksEditor(si){
  const el = document.getElementById(`linksEd_${si}`); if(!el) return;
  const sec = cfg.meSections[si]; if(sec.type!=='social') return;
  el.innerHTML = (sec.links||[]).map((l,li)=>`
    <div class="admin-row">
      <input class="admin-input" value="${l.name}" placeholder="Name" onchange="cfg.meSections[${si}].links[${li}].name=this.value"/>
      <input class="admin-input" value="${l.url}" placeholder="https://..." onchange="cfg.meSections[${si}].links[${li}].url=this.value"/>
      <input type="color" class="color-input" value="${l.color||'#ffffff'}"
        onchange="cfg.meSections[${si}].links[${li}].color=this.value"/>
      <button class="admin-btn admin-btn-remove" onclick="removeLink(${si},${li})">✕</button>
    </div>`).join('');
}

function addSection(){ cfg.meSections.push({type:'tags',label:'New',tags:[{text:'Tag',color:'#5b8dee',bg:'#5b8dee18'}]}); renderSectionsEditor(); }
function removeSection(si){ cfg.meSections.splice(si,1); renderSectionsEditor(); }
function addTag(si){ if(!cfg.meSections[si].tags) cfg.meSections[si].tags=[]; cfg.meSections[si].tags.push({text:'Tag',color:'#5b8dee',bg:'#5b8dee18'}); renderTagsEditor(si); }
function removeTag(si,ti){ cfg.meSections[si].tags.splice(ti,1); renderTagsEditor(si); }
function addLink(si){ if(!cfg.meSections[si].links) cfg.meSections[si].links=[]; cfg.meSections[si].links.push({name:'Link',url:'https://',color:'#aaaaff'}); renderLinksEditor(si); }
function removeLink(si,li){ cfg.meSections[si].links.splice(li,1); renderLinksEditor(si); }

function applyAndSave(){
  cfg.siteName = document.getElementById('cfgSiteName').value.trim();
  cfg.meTitle  = document.getElementById('cfgMeTitle').value.trim();
  // Steam
  const steamSec = cfg.meSections.find(s=>s.type==='steam');
  if(steamSec){
    steamSec.vanityUrl = document.getElementById('cfgSteamVanity').value.trim();
    steamSec.steamId64 = document.getElementById('cfgSteamId').value.trim();
  }
  // Last.fm / Spotify
  const lfmSec = cfg.meSections.find(s=>s.type==='lastfm');
  if(lfmSec){
    lfmSec.lastfmUser     = document.getElementById('cfgLfmUser').value.trim();
    lfmSec.lastfmApiKey   = document.getElementById('cfgLfmKey').value.trim();
    lfmSec.spotifyEmbedUrl= document.getElementById('cfgSpotify').value.trim();
  }
  const np = document.getElementById('cfgNewPass').value;
  if(np) cfg.adminPassword = np;
  saveConfig();
  renderNav();
  closeAdmin();
}

// ── Init ──
renderNav();
</script>
